//======================================================================================================
// 1) json2csv() — convertisseur jetable
// Prend le JSON source DataFlowLines → sort { csvLst, f_lst, ind_lst }
// csvLst  : [ [age, v1, v2, ...], [15, 0, 0, ...], ... ]  — tableau de tableaux, pas de strings
// f_lst   : [ "age", "raceWm", "raceBm", ... ]            — liste des colonnes
// ind_lst : [ "raceWm", "raceBm", ... ]                   — colonnes sans "age"
//======================================================================================================

function json2csv({ json }) {

    var f_lst  = Object.keys(json.data[0]) ;           // ["age","raceWm","raceBm",...]
    var ind_lst = f_lst.filter(f => f !== "age") ;      // sans "age"

    var csvLst  = json.data.map(row =>
        f_lst.map(f => row[f])                          // [ [15,0,0,...], [16,0,...], ... ]
    ) ;

    return { csvLst, f_lst, ind_lst } ;
}


//======================================================================================================
// 2) csv2datagroups() — programme réutilisable
// Prend { csvLst, f_lst, ind_lst } → sort { data[], groups{}, ind_lst, dim_lst }
// data[]   : [ {age:15, raceWm:0, ...}, ... ]           — format original wide
// groups{} : { raceWm:{ values:[{age,value},...] }, ... } — format pivot par field
// ind_lst  : passthrough — liste des indicateurs
// dim_lst  : détectées auto — ["m","f"] si convention suffixe
//======================================================================================================

function csv2datagroups({ csvLst, f_lst, ind_lst }) {

    //--- 1) rebuild data[] — objets depuis tableaux
    var data = csvLst.map(row => {
        var obj = {} ;
        f_lst.forEach((f, i) => { obj[f] = row[i] ; }) ;
        return obj ;
    }) ;

    //--- 2) buildGroups — pivot par field
    var groups = {} ;
    ind_lst.forEach(fld => { groups[fld] = { values:[] } ; }) ;

    data.forEach(row => {
        ind_lst.forEach(fld => {
            groups[fld].values.push({ age:row.age, value:row[fld] }) ;
        }) ;
    }) ;

    //--- 3) dim_lst — détection auto via suffixe
    var suffixes = new Set() ;
    ind_lst.forEach(fld => {
        var last = fld.slice(-1) ;
        if (last === "m" || last === "f") suffixes.add(last) ;
    }) ;
    var dim_lst = [...suffixes] ;                       // ["m","f"] ou [] si pas de convention

    return { data, groups, ind_lst, dim_lst } ;
}
